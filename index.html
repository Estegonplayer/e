<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Semáforo do Silêncio</title>
  <style>
    :root {
      --bg: #0c0f14; --surface: #151a22; --border: #2a3344;
      --text: #e8edf5; --muted: #8b97ab; --amber: #f5b942;
      --green: #3ecf8e; --red: #f07178;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 520px; margin: 0 auto; padding: 20px 16px 40px; }
    h1 { font-size: 1.25rem; margin: 0 0 4px; }
    .sub { color: var(--muted); font-size: 0.82rem; margin-bottom: 16px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
    .card h2 { font-size: 0.68rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 0 0 12px; }
    label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text);
    }
    input[type="range"] { width: 100%; accent-color: var(--amber); }
    input[type="color"] { width: 100%; height: 40px; border: none; border-radius: 8px; cursor: pointer; }
    .row { margin-bottom: 12px; }
    .val { color: var(--amber); font-variant-numeric: tabular-nums; }
    button {
      width: 100%; padding: 12px; border: none; border-radius: 8px;
      font-weight: 600; cursor: pointer; margin-top: 6px;
    }
    .btn-primary { background: var(--amber); color: #111; }
    .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .meter { height: 8px; background: var(--bg); border-radius: 4px; margin-top: 8px; overflow: hidden; }
    .meter-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--green), var(--amber), var(--red)); transition: width .08s; }
    .status { display: inline-flex; align-items: center; gap: 6px; font-size: 0.75rem; padding: 4px 10px; border-radius: 20px; margin-bottom: 12px; background: rgba(62,207,142,.12); color: var(--green); }
    .status.off { background: rgba(240,113,120,.12); color: var(--red); }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .colors { display: grid; gap: 10px; }
    .hint { font-size: 0.72rem; color: var(--muted); margin-top: 10px; }
    .log { font-size: 0.7rem; color: var(--muted); max-height: 80px; overflow-y: auto; margin-top: 8px; font-family: monospace; }
    .hidden { display: none !important; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Semáforo do Silêncio</h1>
    <p class="sub">5 toques no touch → BLE visível · Alterações aplicam na hora</p>
    <div id="statusPill" class="status off"><span class="dot"></span><span id="statusText">Desconectado</span></div>

    <section id="panelConnect" class="card">
      <button id="btnConnect" class="btn-primary" type="button">Conectar Bluetooth</button>
    </section>

    <section id="panelAuth" class="card hidden">
      <h2>PIN</h2>
      <input id="pin" type="password" placeholder="1234" />
      <button id="btnLogin" class="btn-primary" type="button">Entrar</button>
    </section>

    <section id="panelConfig" class="hidden">
      <div class="card">
        <h2>Nível ao vivo</h2>
        <div>Nível: <span id="liveRms" class="val">0</span> · Voz: <span id="liveVoice" class="val">0</span>%</div>
        <div class="meter"><div id="meterFill" class="meter-fill"></div></div>
      </div>

      <div class="card">
        <h2>Limites de volume</h2>
        <div class="row">
          <label>Atenção (amarelo) — <span id="valY" class="val">150</span></label>
          <input id="limY" type="range" min="0" max="990" step="5" value="150" />
        </div>
        <div class="row">
          <label>Alto (vermelho) — <span id="valR" class="val">350</span></label>
          <input id="limR" type="range" min="10" max="1000" step="5" value="350" />
        </div>
      </div>

      <div class="card">
        <h2>Cores do LED</h2>
        <div class="colors">
          <div class="row">
            <label>Normal (silêncio OK)</label>
            <input id="colNormal" type="color" value="#00b400" />
          </div>
          <div class="row">
            <label>Limite (atenção)</label>
            <input id="colLimit" type="color" value="#ffc800" />
          </div>
          <div class="row">
            <label>Alerta (piscando)</label>
            <input id="colAlert" type="color" value="#ff0000" />
          </div>
        </div>
        <p class="hint">Mexe na cor → a caixinha muda na hora.</p>
      </div>

      <div class="card">
        <h2>Voz & dispositivo</h2>
        <div class="row">
          <label>Sensibilidade voz — <span id="valVoz" class="val">55</span>%</label>
          <input id="voz" type="range" min="0" max="100" value="55" />
        </div>
        <div class="row">
          <label>Nome Bluetooth</label>
          <input id="nome" type="text" placeholder="Semaforo_Mesa_01" />
        </div>
        <div class="row">
          <label>Novo PIN (mín. 4)</label>
          <input id="novaSenha" type="password" />
        </div>
        <div class="row">
          <label><input id="touchOk" type="checkbox" checked /> Toque para desligar alerta</label>
        </div>
      </div>

      <div class="card">
        <h2>Ambiente</h2>
        <button id="btnCalibrar" class="btn-primary" type="button">Calibrar silêncio agora</button>
        <div class="grid2">
          <button id="btnExport" class="btn-ghost" type="button">Exportar</button>
          <button id="btnImport" class="btn-ghost" type="button">Importar</button>
        </div>
        <textarea id="jsonBox" class="hidden" rows="4" style="width:100%;margin-top:8px;font-size:0.7rem"></textarea>
      </div>

      <button id="btnDisconnect" class="btn-ghost" type="button">Desconectar</button>
      <div id="log" class="log"></div>
    </section>
  </div>

  <script>
    const SERVICE_UUID = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
    const CHAR_CMD = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';
    const CHAR_NOTIFY = 'beb5483e-36e1-4688-b7f5-ea07361b26a9';

    let device, cmdChar, notifyChar;
    let authenticated = false;
    let applyingCfg = false;

    const $ = (id) => document.getElementById(id);

    function log(msg) {
      const el = $('log');
      if (el) el.textContent = `[${new Date().toLocaleTimeString()}] ${msg}\n` + el.textContent;
    }

    function debounce(fn, ms) {
      let t;
      return (...args) => {
        clearTimeout(t);
        t = setTimeout(() => fn(...args), ms);
      };
    }

    function rgbHex(id) {
      const h = $(id).value.replace('#', '');
      return {
        r: parseInt(h.slice(0, 2), 16),
        g: parseInt(h.slice(2, 4), 16),
        b: parseInt(h.slice(4, 6), 16),
      };
    }

    function setColorInput(id, r, g, b) {
      $(id).value = '#' + [r, g, b].map((x) => x.toString(16).padStart(2, '0')).join('');
    }

    async function writeCmd(str, needAuth = true) {
      if (!cmdChar) return;
      if (needAuth && !authenticated) return;
      const enc = new TextEncoder();
      await cmdChar.writeValue(enc.encode(str));
    }

    const sendLimits = debounce(async () => {
      await writeCmd(`LIMITES:${$('limY').value},${$('limR').value}`);
    }, 180);

    const sendVoz = debounce(async () => {
      await writeCmd('VOZ:' + $('voz').value);
    }, 180);

    const sendColor = debounce(async (zone, id) => {
      const { r, g, b } = rgbHex(id);
      await writeCmd(`CORES:${zone},${r},${g},${b}`);
    }, 120);

    const sendNome = debounce(async () => {
      const n = $('nome').value.trim();
      if (n) await writeCmd('NOME:' + n);
    }, 500);

    const sendSenha = debounce(async () => {
      const s = $('novaSenha').value;
      if (s.length >= 4) {
        await writeCmd('ALTERARSENHA:' + s);
        $('novaSenha').value = '';
      }
    }, 500);

    function syncSliders() {
      $('valY').textContent = $('limY').value;
      $('valR').textContent = $('limR').value;
      $('valVoz').textContent = $('voz').value;
    }

    function applyCfgToUi(cfg) {
      applyingCfg = true;
      $('limY').value = cfg.limY ?? 150;
      $('limR').value = cfg.limR ?? 350;
      $('voz').value = cfg.voz ?? 55;
      $('nome').value = cfg.name ?? '';
      $('touchOk').checked = cfg.touchOk !== false;
      setColorInput('colNormal', cfg.nR ?? 0, cfg.nG ?? 180, cfg.nB ?? 0);
      setColorInput('colLimit', cfg.lR ?? 255, cfg.lG ?? 200, cfg.lB ?? 0);
      setColorInput('colAlert', cfg.aR ?? cfg.r ?? 255, cfg.aG ?? cfg.g ?? 0, cfg.aB ?? cfg.b ?? 0);
      syncSliders();
      applyingCfg = false;
    }

    function onNotify(event) {
      const msg = new TextDecoder().decode(event.target.value);
      log('← ' + msg);

      if (msg.startsWith('OK:LOGIN')) {
        authenticated = true;
        $('statusPill').classList.remove('off');
        $('statusText').textContent = 'Conectado';
        $('panelConnect').classList.add('hidden');
        $('panelAuth').classList.add('hidden');
        $('panelConfig').classList.remove('hidden');
        writeCmd('EXPORT:');
      }
      if (msg.startsWith('ERR:LOGIN')) alert('PIN incorreto');

      if (msg.startsWith('CONFIG:')) {
        try {
          applyCfgToUi(JSON.parse(msg.slice(7)));
        } catch (e) {}
      }

      if (msg.startsWith('LVL:')) {
        const [rms, , voice] = msg.slice(4).split(',');
        $('liveRms').textContent = rms;
        $('liveVoice').textContent = voice;
        $('meterFill').style.width = Math.min(100, parseFloat(rms) / 10) + '%';
      }
    }

    $('limY').addEventListener('input', () => { syncSliders(); sendLimits(); });
    $('limR').addEventListener('input', () => { syncSliders(); sendLimits(); });
    $('voz').addEventListener('input', () => { syncSliders(); sendVoz(); });

    $('colNormal').addEventListener('input', () => {
      if (!applyingCfg) sendColor(0, 'colNormal');
    });
    $('colLimit').addEventListener('input', () => {
      if (!applyingCfg) sendColor(1, 'colLimit');
    });
    $('colAlert').addEventListener('input', () => {
      if (!applyingCfg) sendColor(2, 'colAlert');
    });

    $('nome').addEventListener('change', sendNome);
    $('novaSenha').addEventListener('change', sendSenha);
    $('touchOk').addEventListener('change', async () => {
      await writeCmd($('touchOk').checked ? 'CONFIRMACAO:LIGADO' : 'CONFIRMACAO:DESLIGADO');
    });

    $('btnConnect').onclick = async () => {
      if (!navigator.bluetooth) {
        alert('Use Chrome ou Edge (Web Bluetooth).');
        return;
      }
      try {
        device = await navigator.bluetooth.requestDevice({
          filters: [{ services: [SERVICE_UUID] }],
        });
        device.addEventListener('gattserverdisconnected', () => {
          authenticated = false;
          $('statusPill').classList.add('off');
          $('statusText').textContent = 'Desconectado';
          $('panelConfig').classList.add('hidden');
          $('panelAuth').classList.add('hidden');
          $('panelConnect').classList.remove('hidden');
        });
        const server = await device.gatt.connect();
        const svc = await server.getPrimaryService(SERVICE_UUID);
        cmdChar = await svc.getCharacteristic(CHAR_CMD);
        notifyChar = await svc.getCharacteristic(CHAR_NOTIFY);
        await notifyChar.startNotifications();
        notifyChar.addEventListener('characteristicvaluechanged', onNotify);
        $('panelConnect').classList.add('hidden');
        $('panelAuth').classList.remove('hidden');
        $('statusPill').classList.remove('off');
        $('statusText').textContent = 'Informe o PIN';
      } catch (e) {
        alert(e.message);
      }
    };

    $('btnLogin').onclick = async () => {
      const pin = $('pin').value;
      if (!pin) return;
      await writeCmd('LOGIN:' + pin, false);
    };

    $('btnCalibrar').onclick = () => writeCmd('CALIBRAR:');
    $('btnExport').onclick = () => writeCmd('EXPORT:');
    $('btnImport').onclick = async () => {
      let json = $('jsonBox').value.trim();
      if (!json) {
        $('jsonBox').classList.remove('hidden');
        json = prompt('Cole o JSON:');
        if (!json) return;
      }
      await writeCmd('IMPORT:' + json);
    };
    $('btnDisconnect').onclick = () => device?.gatt?.disconnect();

    syncSliders();
  </script>
</body>
</html>
