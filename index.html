<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-silent — Painel Master</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
:root{
  --bg:#0e0f14;
  --surface:#16181f;
  --surface2:#1e2029;
  --border:#2a2d3a;
  --text:#d4d8e8;
  --muted:#6b7280;

  --green:#22c55e;
  --amber:#f59e0b;
  --red:#ef4444;
  --blue:#3b82f6;
  --accent:#6366f1;

  --mono:'IBM Plex Mono', monospace;
  --sans:'IBM Plex Sans', sans-serif;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  padding:24px 16px 48px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.card{
  width:100%;
  max-width:580px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  margin-bottom:14px;
}

.card-header{
  background:var(--surface2);
  border-bottom:1px solid var(--border);
  padding:14px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.card-body{
  padding:18px;
}

.header{
  width:100%;
  max-width:580px;
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:24px;
}

.traffic{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.traffic span{
  width:11px;
  height:11px;
  border-radius:50%;
}

.r{background:var(--red);}
.y{background:var(--amber);}
.g{background:var(--green);}

h1{
  font-size:1.3rem;
}

p{
  color:var(--muted);
}

.badge{
  padding:4px 8px;
  border-radius:6px;
  font-size:.72rem;
  font-family:var(--mono);
}

.badge-off{
  background:#2a1313;
  color:var(--red);
}

.badge-on{
  background:#102616;
  color:var(--green);
}

.badge-auth{
  background:#0f1d36;
  color:#60a5fa;
}

.conn{
  display:flex;
  gap:12px;
  align-items:center;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--red);
}

.dot.on{
  background:var(--green);
  box-shadow:0 0 10px var(--green);
}

button{
  border:none;
  border-radius:8px;
  padding:10px 16px;
  cursor:pointer;
  font-family:var(--mono);
  font-weight:600;
  transition:.15s;
}

button:hover{
  opacity:.9;
}

button:disabled{
  opacity:.4;
  cursor:not-allowed;
}

.btn-primary{
  background:var(--accent);
  color:white;
}

.btn-outline{
  background:transparent;
  border:1px solid var(--border);
  color:var(--text);
}

.btn-cyan{
  background:#0d2931;
  color:#67e8f9;
  border:1px solid #164e63;
}

.btn-danger{
  background:#3b1010;
  color:#ef4444;
}

input,select{
  width:100%;
  padding:10px 12px;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text);
  font-family:var(--mono);
}

label{
  display:block;
  margin-bottom:6px;
  font-size:.75rem;
  font-family:var(--mono);
  color:var(--muted);
}

.field{
  margin-bottom:18px;
}

.form-row{
  display:flex;
  gap:12px;
}

.chart-wrap{
  position:relative;
  height:160px;
}

.chart-value{
  font-size:2rem;
  font-family:var(--mono);
  font-weight:600;
  text-align:center;
}

.hidden{
  display:none !important;
}

#toast{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px 18px;
  transition:.25s;
  font-family:var(--mono);
}

#toast.show{
  transform:translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<div class="header">
  <div class="traffic">
    <span class="r"></span>
    <span class="y"></span>
    <span class="g"></span>
  </div>

  <div>
    <h1>E-silent</h1>
    <p>Painel Master Bluetooth</p>
  </div>
</div>

<div class="card">
  <div class="card-header">
    <span>Bluetooth</span>
    <span class="badge badge-off" id="connBadge">OFFLINE</span>
  </div>

  <div class="card-body">
    <div class="conn">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">Desconectado</span>
      <button class="btn-primary" id="btnConnect">Conectar</button>
    </div>
  </div>
</div>

<div class="card hidden" id="authCard">
  <div class="card-header">
    <span>Autenticação</span>
    <span class="badge badge-off" id="authBadge">NÃO AUTENTICADO</span>
  </div>

  <div class="card-body">
    <div class="field">
      <label>Senha</label>

      <div class="form-row">
        <input type="password" id="password" placeholder="1234">
        <button class="btn-primary" id="btnLogin">Entrar</button>
      </div>
    </div>
  </div>
</div>

<div class="card hidden" id="chartCard">
  <div class="card-header">
    <span>Monitoramento</span>
    <span class="badge badge-on">AO VIVO</span>
  </div>

  <div class="card-body">

    <div class="chart-value" id="liveValue">0</div>

    <div class="chart-wrap">
      <canvas id="audioChart"></canvas>
    </div>

  </div>
</div>

<div class="card hidden" id="configCard">
  <div class="card-header">
    <span>Configurações</span>
    <span class="badge badge-auth">ADMIN</span>
  </div>

  <div class="card-body">

    <div class="field">
      <label>Limite Amarelo</label>
      <input type="number" id="limitAmarelo">
    </div>

    <div class="field">
      <label>Limite Vermelho</label>
      <input type="number" id="limitVermelho">
    </div>

    <button class="btn-primary" id="btnSalvar">Salvar Limites</button>

  </div>
</div>

<div id="toast"></div>

<script>
const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

let bleDevice = null;
let bleCharacteristic = null;

let isAuthenticated = false;

const UI = {
  btnConnect: document.getElementById("btnConnect"),
  statusText: document.getElementById("statusText"),
  statusDot: document.getElementById("statusDot"),
  connBadge: document.getElementById("connBadge"),

  authCard: document.getElementById("authCard"),
  chartCard: document.getElementById("chartCard"),
  configCard: document.getElementById("configCard"),

  authBadge: document.getElementById("authBadge"),

  liveValue: document.getElementById("liveValue"),

  limitAmarelo: document.getElementById("limitAmarelo"),
  limitVermelho: document.getElementById("limitVermelho")
};

function toast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");

  setTimeout(()=>{
    t.classList.remove("show");
  },3000);
}

const chartData = new Array(80).fill(0);

const ctx = document.getElementById('audioChart').getContext('2d');

const audioChart = new Chart(ctx,{
  type:'line',
  data:{
    labels: chartData.map(()=> ''),
    datasets:[
      {
        data:[...chartData],
        borderColor:'#22c55e',
        borderWidth:2,
        pointRadius:0,
        tension:0.3
      }
    ]
  },
  options:{
    responsive:true,
    maintainAspectRatio:false,
    animation:false,
    plugins:{
      legend:{display:false}
    },
    scales:{
      x:{display:false},
      y:{
        min:0,
        suggestedMax:2000
      }
    }
  }
});

function pushValue(v){

  chartData.shift();
  chartData.push(v);

  audioChart.data.datasets[0].data = [...chartData];

  UI.liveValue.innerText = Math.round(v);

  audioChart.update('none');
}

async function connectBLE(){

  try{

    bleDevice = await navigator.bluetooth.requestDevice({
      acceptAllDevices:true,
      optionalServices:[SERVICE_UUID]
    });

    const server = await bleDevice.gatt.connect();

    const service = await server.getPrimaryService(SERVICE_UUID);

    bleCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

    await bleCharacteristic.startNotifications();

    bleCharacteristic.addEventListener(
      'characteristicvaluechanged',
      handleNotification
    );

    UI.statusText.innerText = "Conectado";
    UI.statusDot.classList.add("on");

    UI.connBadge.innerText = "ONLINE";
    UI.connBadge.className = "badge badge-on";

    UI.btnConnect.innerText = "Desconectar";

    UI.authCard.classList.remove("hidden");

    bleDevice.addEventListener('gattserverdisconnected', resetUI);

  }catch(e){

    console.error(e);

    toast("Erro ao conectar");
  }
}

function resetUI(){

  bleDevice = null;
  bleCharacteristic = null;

  UI.statusText.innerText = "Desconectado";

  UI.statusDot.classList.remove("on");

  UI.connBadge.innerText = "OFFLINE";
  UI.connBadge.className = "badge badge-off";

  UI.btnConnect.innerText = "Conectar";

  UI.authCard.classList.add("hidden");
  UI.chartCard.classList.add("hidden");
  UI.configCard.classList.add("hidden");

  isAuthenticated = false;
}

async function sendCommand(cmd){

  if(!bleCharacteristic) return;

  await bleCharacteristic.writeValue(
    new TextEncoder().encode(cmd)
  );
}

function handleNotification(event){

  const raw = new TextDecoder().decode(event.target.value);

  console.log("BLE:", raw);

  // =========================
  // DATA
  // =========================
  if(raw.startsWith("DATA:")){

    const val = parseFloat(raw.substring(5));

    if(!isNaN(val)){

      pushValue(val);
    }

    return;
  }

  // =========================
  // CONFIG
  // =========================
  if(raw.startsWith("CONFIG:")){

    const parts = raw.substring(7).split(",");

    UI.limitAmarelo.value = parts[0];
    UI.limitVermelho.value = parts[1];

    return;
  }

  // =========================
  // LOGIN OK
  // =========================
  if(raw.startsWith("AUTH_OK")){

    isAuthenticated = true;

    UI.authBadge.innerText = "AUTENTICADO";
    UI.authBadge.className = "badge badge-auth";

    UI.chartCard.classList.remove("hidden");
    UI.configCard.classList.remove("hidden");

    toast("Autenticado");

    return;
  }

  // =========================
  // LOGIN FAIL
  // =========================
  if(raw.startsWith("AUTH_FAIL")){

    toast("Senha incorreta");

    return;
  }
}

UI.btnConnect.addEventListener("click", ()=>{

  if(bleDevice && bleDevice.gatt.connected){

    bleDevice.gatt.disconnect();

  }else{

    connectBLE();
  }
});

document.getElementById("btnLogin").addEventListener("click", async ()=>{

  const pass = document.getElementById("password").value;

  await sendCommand(`LOGIN:${pass}`);
});

document.getElementById("btnSalvar").addEventListener("click", async ()=>{

  const a = UI.limitAmarelo.value;
  const v = UI.limitVermelho.value;

  await sendCommand(`LIMITES:${a},${v}`);

  toast("Limites enviados");
});
</script>

</body>
</html>
